<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b6bcb" />
    <meta name="description" content="Aplicación de test interactivo para preparar el examen de Enfermería 2026" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />
    
    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Test OP" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%230b6bcb' width='180' height='180'/><text x='90' y='120' font-size='70' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'>OP</text></svg>" />
    
    <!-- Google Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#0b6bcb" />
    <meta name="msapplication-config" content="browserconfig.xml" />
    
    <title>Test OP Enfermeria 2026</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <header class="app__header">
        <h1 class="titulo">Test OP Enfermería</h1>
        <p id="estado" class="estado">Cargando preguntas...</p>
      </header>

      <section id="inicio" class="tarjeta inicio" aria-label="Pantalla de inicio">
        <h2 class="pregunta">Listo para empezar el test</h2>
        <p id="inicioTexto" class="inicio__texto">Esta es la pantalla inicial. Desde aqui podras lanzar el quiz y luego sumar nuevas funciones.</p>
        
        <!-- Accordion de Ajustes -->
        <details class="accordion" id="ajustesAccordion">
          <summary class="accordion__header">⚙️ Ajustes</summary>
          <div class="accordion__content">
            <label class="modo-test-control" for="modoTestSwitch">
              <span class="modo-test-control__texto">Modo test (sin correccion hasta el final)</span>
              <span class="switch">
                <input id="modoTestSwitch" type="checkbox" role="switch" aria-label="Activar modo test" />
                <span class="switch__slider" aria-hidden="true"></span>
              </span>
            </label>
            <label class="modo-test-control" for="soloNoVistasSwitch">
              <span class="modo-test-control__texto">Solo preguntas no vistas</span>
              <span class="switch">
                <input id="soloNoVistasSwitch" type="checkbox" role="switch" aria-label="Activar preguntas no vistas" />
                <span class="switch__slider" aria-hidden="true"></span>
              </span>
            </label>
            <label class="modo-test-control" for="preguntasPorTestInput" style="display:flex;flex-direction:column;align-items:flex-start;gap:0.35rem;">
              <span class="modo-test-control__texto">Preguntas por test</span>
              <input id="preguntasPorTestInput" type="number" min="1" step="1" placeholder="10" style="width:96px;padding:6px;border-radius:8px;border:1px solid var(--border)" />
            </label>
            <div class="modo-test-control" id="rangoControles" style="margin-top:0.8rem; display:flex; flex-direction:column; gap:0.6rem;">
              <label style="display:flex;align-items:center;gap:0.5rem;">Rango:
                <input id="rangeStart" type="number" min="1" placeholder="Desde" style="width:80px;padding:6px;border-radius:8px;border:1px solid var(--border)" />
                <input id="rangeEnd" type="number" min="1" placeholder="Hasta" style="width:80px;padding:6px;border-radius:8px;border:1px solid var(--border)" />
              </label>
              <button id="limpiarRangoBtn" class="accion-btn secundario" type="button" style="width:100%;padding:0.5rem 0.8rem;">Limpiar rango</button>
            </div>
            <button id="guardarAjustesBtn" class="accion-btn" type="button" style="width:100%;margin-top:0.8rem;">Guardar ajustes</button>
          </div>
        </details>
        
        <button id="iniciarBtn" class="accion-btn" type="button">Iniciar test</button>
        <button id="repasarFallosBtn" class="accion-btn secundario" type="button">Repasar Fallos</button>
        <p id="porcentajeVistas" class="inicio__texto">Preguntas vistas: 0%</p>
      </section>

      <section id="quiz" class="tarjeta" aria-label="Pregunta actual" hidden>
        <h2 id="pregunta" class="pregunta">Preparando quiz...</h2>
        <div id="preguntaAccion" class="pregunta-accion" hidden></div>
        <div id="opciones" class="opciones" role="group" aria-label="Opciones de respuesta"></div>
        <div class="quiz-nav">
          <button id="siguienteBtn" class="accion-btn quiz-next" type="button" hidden>Saltar pregunta actual</button>
        </div>
      </section>

      <footer id="resultado" class="app__footer" hidden>
        <p id="puntuacion" class="puntuacion">Puntuación: 0</p>
        <section id="resumen" class="resumen" hidden>
          <h3 class="resumen__titulo">Resumen por pregunta</h3>
          <div id="resumenBotones" class="resumen-botones" aria-label="Resumen de aciertos y fallos"></div>
        </section>
      </footer>
    </main>

    <script type="module" src="./app.js"></script>
    
    <!-- Script de actualización de PWA -->
    <script src="./pwa-update.js"></script>
    
    <!-- Registrar Service Worker para PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const swPath = './service-worker.js';

          navigator.serviceWorker.register(swPath, { scope: './' })
            .then((registration) => {
              console.log('✅ Service Worker registrado en:', swPath);
              console.log('📍 Scope:', registration.scope);

              // Comprobar actualización al abrir la app.
              registration.update().catch((error) => {
                console.warn('⚠️ No se pudo comprobar actualización al abrir:', error);
              });
              
              // Buscar actualizaciones cada hora
              setInterval(() => {
                registration.update();
              }, 3600000);
            })
            .catch((error) => {
              console.error('❌ Error al registrar Service Worker:', error);
            });
        });
      }
    </script>
  </body>
</html>
