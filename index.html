<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b6bcb" />
    <meta name="description" content="Aplicación de test interactivo para preparar el examen de Enfermería 2026" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />
    
    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Test OP" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%230b6bcb' width='180' height='180'/><text x='90' y='120' font-size='70' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'>OP</text></svg>" />
    
    <!-- Google Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#0b6bcb" />
    <meta name="msapplication-config" content="browserconfig.xml" />
    
    <title>Test OP Enfermeria 2026</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <header class="app__header">
        <h1 class="titulo">Test OP Enfermería</h1>
        <p id="estado" class="estado">Cargando preguntas...</p>
      </header>

      <section id="inicio" class="tarjeta inicio" aria-label="Pantalla de inicio">
        <h2 class="pregunta">Listo para empezar el test</h2>
        <p id="inicioTexto" class="inicio__texto">Esta es la pantalla inicial. Desde aqui podras lanzar el quiz y luego sumar nuevas funciones.</p>
        <label class="modo-test-control" for="modoTestSwitch">
          <span class="modo-test-control__texto">Modo test (sin correccion hasta el final)</span>
          <span class="switch">
            <input id="modoTestSwitch" type="checkbox" role="switch" aria-label="Activar modo test" />
            <span class="switch__slider" aria-hidden="true"></span>
          </span>
        </label>
        <button id="iniciarBtn" class="accion-btn" type="button">Iniciar test</button>
        <button id="repasarFallosBtn" class="accion-btn secundario" type="button">Repasar Fallos</button>
      </section>

      <section id="quiz" class="tarjeta" aria-label="Pregunta actual" hidden>
        <h2 id="pregunta" class="pregunta">Preparando quiz...</h2>
        <div id="preguntaAccion" class="pregunta-accion" hidden></div>
        <div id="opciones" class="opciones" role="group" aria-label="Opciones de respuesta"></div>
        <div class="quiz-nav">
          <button id="siguienteBtn" class="accion-btn quiz-next" type="button" hidden>Saltar pregunta actual</button>
        </div>
      </section>

      <footer id="resultado" class="app__footer" hidden>
        <p id="puntuacion" class="puntuacion">Puntuación: 0</p>
        <section id="resumen" class="resumen" hidden>
          <h3 class="resumen__titulo">Resumen por pregunta</h3>
          <div id="resumenBotones" class="resumen-botones" aria-label="Resumen de aciertos y fallos"></div>
        </section>
      </footer>
    </main>

    <script type="module" src="./app.js"></script>
    
    <!-- Registrar Service Worker para PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then((registration) => {
              console.log('✅ Service Worker registrado:', registration);
            })
            .catch((error) => {
              console.error('❌ Error al registrar Service Worker:', error);
            });
        });
      }
    </script>
  </body>
</html>
